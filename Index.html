<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>言語解読アドベンチャー</title>
        <style>
            body 
            {
                background: #1a1a2e;
                color: #e0e0e0; font-family:
                'Courier New', monospace; display:
                flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }
            #game-container 
            {
                display: flex;
                gap: 20px;
               max-width: 900px;
            }
            .panel 
            {
                background: #0f3460;
                padding: 20px;
                border-radius: 8px;
                flex: 1;
                height: 500px;
                overflow-y: auto;
            }
            #main-area
            {
                width: 350px;
                display: flex;
                flex-direction:column;
                align-items: center;
            }
            .stack-container
            {
                display: flex;
                flex-direction: column-reverse;
                height: 350px;
                border-bottom: 4px solid #52de97;
                width: 100%;
                margin-bottom: 20px; }
                .box
                {
                    background: #52de97;
                    color: #1a1a2e;
                    padding: 10px;
                    margin: 4px;
                    text-align: center;
                    border-radius: 4px;
                    font-weight: bold;
                }
                input 
                {
                    padding: 8px;
                    width: 80%;
                    margin-bottom: 10px;
                }
                button
                {
                    padding: 8px 15px;
                    cursor: pointer;
                }
                </style>
    </head>
<body>

<h1>言語学者の調査記録：異世界の孤立語</h1>

<div id="game-container">
    <div class="panel">
        <h3>解読辞書</h3>
        <div id="dict-list"></div>
    </div>

    <div id="main-area">
        <div id="stack" class="stack-container"></div>
        <p id="problem">看板: 読み込み中...</p>
        <input type="text" id="input" placeholder="翻訳 (例: 果物 行く 店)">
        <button onclick="check()">積み上げる</button>
    </div>

    <div class="panel">
        <h3>考察メモ</h3>
        <div id="notes"></div>
    </div>
</div>

<script src="Dictionary.js"></script>
<script src="Questions.js"></script>
<script>
    let dictionary = {};
    let meaningToEnglish = {}; 

    function encodeWord(englishWord) {
        const word = englishWord.toLowerCase();
        const keyboard = "qwertyuiopasdfghjklzxcvbnm";
        const shifted =  "fghjklzxcvbnmqwertyuiopasd";
        let encoded = "";
        for (let char of word) {
            let index = keyboard.indexOf(char);
            encoded += (index !== -1) ? shifted[index] : char;
        }
        return encoded.slice(0, 2) + Math.floor(Math.random() * 9) + encoded.slice(2);
    }

    function init() {
        // 1. 表記ゆれ吸収用逆引き辞書の作成
        for (let eng in sourceDictionary) {
            let jp = sourceDictionary[eng];
            if (!meaningToEnglish[jp]) meaningToEnglish[jp] = [];
            meaningToEnglish[jp].push(eng.toLowerCase());
        }

        // 2. 暗号化辞書の作成
        for (let eng in sourceDictionary) {
            englishToSecret[eng] = encodeWord(eng);
            dictionary[englishToSecret[eng]] = sourceDictionary[eng];
        }
        
        // 辞書リスト表示
        const list = document.getElementById('dict-list');
        list.innerHTML = Object.entries(dictionary).map(([k, v]) => `<p>${k} = ${v}</p>`).join('');
        
        nextProblem();
    }

    function check() {
        const input = document.getElementById('input');
        const userWords = input.value.trim().split(/\s+/);
        
        if (userWords.length !== currentQuestionWords.length) {
            alert("単語の数が違うようです。");
            return;
        }

        // 判定処理
        let isCorrect = userWords.every((u, i) => {
            const possibleEngs = meaningToEnglish[sourceDictionary[currentQuestionWords[i]]];
            return possibleEngs && possibleEngs.includes(u.toLowerCase());
        });

        if(isCorrect) {
            // 1. スタック（看板）の見た目を更新
            const stack = document.getElementById('stack');
            const box = document.createElement('div');
            box.className = 'box';
            
            // 日本語訳を作成
            const translatedText = currentQuestionWords.map(w => sourceDictionary[w]).join(' ');
            box.innerText = translatedText;
            stack.appendChild(box);

            // 2. 【ここが新機能】考察メモに追加する処理
            const notes = document.getElementById('notes');
            const noteEntry = document.createElement('p');
            noteEntry.innerHTML = `<strong>解読成功:</strong> ${translatedText} <br><small>原語: ${currentQuestionWords.join(' ')}</small>`;
            notes.prepend(noteEntry); // 新しい順に一番上に表示

            input.value = "";
            nextProblem();
        } else {
            alert("その解釈は文法的に正しくない。");
        }
    }

    window.onload = init;
</script>
</body>
</html>
