<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>古代言語解読の冒険</title>
    <style>
        body {
            background: #0f172a;
            color: #d1d5db;
            font-family: 'Palatino Linotype', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            background: #e5d3b3;
            color: #4a3728;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            height: 500px;
            overflow-y: auto;
            border: 2px solid #854d0e;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        #dict-list p {
            animation: fadeIn 0.5s ease-out;
            margin: 5px 0;
            border-bottom: 1px dashed #b45309;
        }

        .stack-container {
            display: flex;
            flex-direction: column-reverse;
            height: 300px;
            border: 4px ridge #b45309;
            width: 100%;
            margin-bottom: 20px;
            background: #1e293b;
            overflow-y: auto;
        }

        .box {
            background: #52de97;
            color: #064e3b;
            padding: 10px;
            margin: 4px;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
        }

        #game-container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        #main-area {
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            padding: 10px;
            width: 90%;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #b45309;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>古代言語解読の冒険</h1>

    <div id="game-container">
        <div class="panel">
            <h3>解読辞書</h3>
            <div id="dict-list"></div>
        </div>

        <div id="main-area">
            <div id="stack" class="stack-container"></div>
            <p id="problem">読み込み中...</p>
            <p id="crypto-text"></p>
            <input type="text" id="input" placeholder="翻訳を入力してください">
            <button onclick="check()">解読する</button>
        </div>

        <div class="panel">
            <h3>調査日誌</h3>
            <div id="story-area"></div>
            <hr>
            <div id="notes"></div>
        </div>
    </div>

    <script src="Dictionary.js"></script>
    <script src="Questions.js"></script>
    <script src="Story.js"></script>

    <script>
    let currentQuestionIndex = 0; // 現在の問題番号を追跡
    let meaningToEnglish = {}; 

        function init() {
            // 逆引き辞書と暗号化辞書の生成
            for (let eng in sourceDictionary) {
                let jp = sourceDictionary[eng];
                if (!meaningToEnglish[jp]) meaningToEnglish[jp] = [];
                meaningToEnglish[jp].push(eng.toLowerCase());
                englishToSecret[eng] = encodeWord(eng);
            }
            document.getElementById('story-area').innerHTML = Story[0];
            console.log("初期化が完了しました。問題を表示します。");
            nextProblemUI();
        }

        // 表示更新用の関数
        function nextProblemUI() {
        const q = questionLevels[currentLevel][currentQuestionIndex];
        currentQuestionWords = q.words;
        
        document.getElementById('problem').innerText = `看板の様子: ${q.desc}`;
        document.getElementById('crypto-text').innerText = `暗号: ${makeProblemText(currentQuestionWords)}`;
        document.getElementById('input').value = '';
    }

        function encodeWord(englishWord) {
            const word = englishWord.toLowerCase();
            const keyboard = "qwertyuiopasdfghjklzxcvbnm";
            const shifted = "fghjklzxcvbnmqwertyuiopasd";
            let encoded = "";
            for (let char of word) {
                let index = keyboard.indexOf(char);
                encoded += (index !== -1) ? shifted[index] : char;
            }
            return encoded.slice(0, 2) + Math.floor(Math.random() * 9) + encoded.slice(2);
        }

        function check() {
        const input = document.getElementById('input');
        const userWords = input.value.trim().split(/\s+/);
        
        if (userWords.length !== currentQuestionWords.length) {
            alert("単語の数が一致しません。");
            return;
        }

        
    // Index.html の判定ロジックを以下のように変更
let isCorrect = userWords.every((u, i) => {
    const targetEng = currentQuestionWords[i];
    const correctJpList = sourceDictionary[targetEng];
    
    // 入力された文字を「正規化」して比較する
    // 1. 前後のスペースを削除
    // 2. 「。」などの句読点が含まれていたら削除（誤入力対策）
    const normalizedInput = u.trim().replace(/[。、！？\s]/g, ""); 
    
    // リストの中に一致するものがあるかチェック
    // さらに、各正解候補も同様に「正規化」して比較対象を広げます
    return correctJpList.some(correctJp => {
        const normalizedCorrect = correctJp.replace(/[。、！？\s]/g, "");
        return normalizedInput === normalizedCorrect;
    });
});

        if(isCorrect) {
            // 辞書更新
            const list = document.getElementById('dict-list');
            currentQuestionWords.forEach(eng => {
                const secret = englishToSecret[eng];
                if (!document.getElementById('dict-' + secret)) {
                    const entry = document.createElement('p');
                    entry.id = 'dict-' + secret;
                    entry.innerText = `${secret} = ${sourceDictionary[eng]}`;
                    list.appendChild(entry);
                }
            });

            // 問題進行管理
            currentQuestionIndex++;
            if (currentQuestionIndex >= questionLevels[currentLevel].length) {
                // 全問正解でレベルアップ
                currentLevel++;
                currentQuestionIndex = 0;
                alert("レベルアップしました。次の物語へ進みます。");
                if (Story[currentLevel]) {
                    document.getElementById('story-area').innerHTML = Story[currentLevel];
                }
            } else {
                alert("正解！次の看板へ。");
            }
            nextProblemUI();
        } else {
            alert("解釈が正しくありません。もう一度確認してください。");
        }
    }
        window.onload = init;
    </script>
</body>
</html>
